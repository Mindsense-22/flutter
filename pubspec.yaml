name: mindsense_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^1.2.1
  provider: ^6.1.5+1
  dio: ^5.9.0
  carousel_slider: ^5.1.1
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.5.3
  pinput: ^6.0.1
  flutter_svg: ^2.2.2
  permission_handler: ^11.0.0
  image_picker: ^1.2.1
  record: ^6.2.0
  path_provider: ^2.1.5
  audioplayers: ^6.6.0
  cached_network_image: ^3.4.1
  just_audio: ^0.9.40
  intl: ^0.19.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.4"  
  flutter_native_splash: ^2.4.0 
  flutter_lints: ^5.0.0


flutter_launcher_icons:
  android: true
  ios: true
  adaptive_icon_background: "#121A32"
  adaptive_icon_foreground: "assets/images/logo2.png"
  image_path: "assets/images/logo2.png"
  min_sdk_android: 21


flutter_native_splash:
  color: "#121A32"
  image: assets/images/logo2.png
  android_12:
    image: assets/images/logo2.png
    color: "#121A32"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: inter
      fonts:
        - asset: assets/fonts/inter_18pt-Regular.ttf
    #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package      